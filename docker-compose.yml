version: '3.8'

services:

  backend:
    build: ./backend
    container_name: luhn-backend
    ports:
      - "8001:8001"
    environment:
      DB_HOST: db
      DB_NAME: luhn_prod
      DB_USER: admin
      DB_PASSWORD: admin
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: luhn-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgres:14
    container_name: luhn-db
    restart: always
    environment:
      POSTGRES_DB: luhn_prod
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

  adminer:
    image: adminer
    container_name: luhn-adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  postgres_data: